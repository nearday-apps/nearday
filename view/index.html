<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NearDay – Live Countdown</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Background: preset image or category gradient */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.7));
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem 2.5rem 2.5rem;
      max-width: 420px;
      width: 92vw;
    }

    .category-badge {
      display: inline-block;
      padding: 4px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
      opacity: 0.92;
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.25rem);
      opacity: 0.8;
      margin-bottom: 36px;
    }

    .timer {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }

    .unit {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 14px 12px 10px;
      min-width: 68px;
    }

    .unit-value {
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 800;
      line-height: 1;
      display: block;
    }

    .unit-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      opacity: 0.7;
      margin-top: 6px;
      display: block;
    }

    .expired-msg {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 40px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #1a1a2e;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 999px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .cta svg { width: 20px; height: 20px; }

    .footer {
      position: fixed;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      opacity: 0.45;
      z-index: 2;
    }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<div class="card">
  <div id="badge" class="category-badge"></div>
  <h1 id="title">Loading…</h1>
  <p id="subtitle" class="subtitle"></p>

  <div id="timer" class="timer">
    <div class="unit"><span id="t-days" class="unit-value">00</span><span class="unit-label">DAYS</span></div>
    <div class="unit"><span id="t-hours" class="unit-value">00</span><span class="unit-label">HRS</span></div>
    <div class="unit"><span id="t-min" class="unit-value">00</span><span class="unit-label">MIN</span></div>
    <div class="unit"><span id="t-sec" class="unit-value">00</span><span class="unit-label">SEC</span></div>
  </div>
  <div id="expired" class="expired-msg" style="display:none"></div>

  <a id="cta" class="cta" href="https://play.google.com/store/apps/details?id=com.nearday.app" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.33.19.7.24 1.06.14l11.34-6.55-2.43-2.43-9.97 8.84zM.5 1.4A1.5 1.5 0 0 0 0 2.5v19a1.5 1.5 0 0 0 .5 1.11l.06.05 10.64-10.64v-.25L.56 1.35.5 1.4zM20.34 10.3l-2.93-1.7-2.72 2.72 2.72 2.72 2.95-1.7c.84-.49.84-1.56-.02-2.04zM4.24.1 15.58 6.65 13.15 9.08 3.18.24A1.35 1.35 0 0 1 4.24.1z"/></svg>
    Get NearDay on Google Play
  </a>
</div>

<p class="footer">Made with NearDay</p>

<script>
  const params = new URLSearchParams(location.search);
  const title       = params.get('n')   || 'Countdown';
  const ts          = parseInt(params.get('ts') || '0', 10);
  const subtitle    = params.get('sub') || '';
  const category    = (params.get('cat') || 'CUSTOM').toUpperCase();
  const presetImg   = params.get('img');

  const CATEGORY_META = {
    BIRTHDAY:    { label: 'Birthday',    color: '#E91E63', gradient: 'linear-gradient(135deg,#E91E63,#9C1042)' },
    HOLIDAY:     { label: 'Holiday',     color: '#4CAF50', gradient: 'linear-gradient(135deg,#4CAF50,#1B5E20)' },
    WEDDING:     { label: 'Wedding',     color: '#FF9800', gradient: 'linear-gradient(135deg,#FF9800,#E65100)' },
    VACATION:    { label: 'Vacation',    color: '#2196F3', gradient: 'linear-gradient(135deg,#42A5F5,#0D47A1)' },
    EXAM:        { label: 'Exam',        color: '#9C27B0', gradient: 'linear-gradient(135deg,#9C27B0,#4A148C)' },
    ANNIVERSARY: { label: 'Anniversary', color: '#EC407A', gradient: 'linear-gradient(135deg,#EC407A,#880E4F)' },
    FESTIVAL:    { label: 'Festival',    color: '#FF5722', gradient: 'linear-gradient(135deg,#FF7043,#BF360C)' },
    CUSTOM:      { label: 'Custom',      color: '#607D8B', gradient: 'linear-gradient(135deg,#78909C,#37474F)' },
  };

  const meta = CATEGORY_META[category] || CATEGORY_META.CUSTOM;

  // Populate static content
  document.getElementById('title').textContent = decodeURIComponent(title);
  document.getElementById('badge').textContent = meta.label;
  document.getElementById('badge').style.background = meta.color;
  if (subtitle) {
    document.getElementById('subtitle').textContent = decodeURIComponent(subtitle);
  } else {
    document.getElementById('subtitle').style.display = 'none';
  }

  // Background: try preset image, fall back to gradient
  const bg = document.getElementById('bg');
  if (presetImg) {
    const img = new Image();
    img.onload = () => { bg.style.backgroundImage = `url(${img.src})`; };
    img.onerror = () => { bg.style.background = meta.gradient; };
    img.src = `../../presets/${encodeURIComponent(presetImg)}.jpg`;
  } else {
    bg.style.background = meta.gradient;
  }

  // Countdown logic
  const pad = n => String(n).padStart(2, '0');

  function tick() {
    const now = Date.now();
    const diff = ts - now;
    if (diff <= 0) {
      document.getElementById('timer').style.display  = 'none';
      const expEl = document.getElementById('expired');
      expEl.textContent = 'Event Started! 🎉';
      expEl.style.display = 'block';
      return;
    }
    const totalSec = Math.floor(diff / 1000);
    document.getElementById('t-days').textContent  = Math.floor(totalSec / 86400);
    document.getElementById('t-hours').textContent = pad(Math.floor((totalSec % 86400) / 3600));
    document.getElementById('t-min').textContent   = pad(Math.floor((totalSec % 3600) / 60));
    document.getElementById('t-sec').textContent   = pad(totalSec % 60);
    setTimeout(tick, 1000 - (Date.now() % 1000));
  }

  tick();
</script>
</body>
</html>
